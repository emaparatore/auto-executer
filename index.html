<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plans Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; }
    
    .header { background: white; border-bottom: 1px solid #e2e8f0; padding: 16px 24px; position: sticky; top: 0; z-index: 100; }
    .header-content { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .logo { font-size: 20px; font-weight: 700; color: #0f172a; display: flex; align-items: center; gap: 8px; }
    .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; }
    
    .search-box { flex: 1; max-width: 500px; position: relative; }
    .search-input { width: 100%; padding: 10px 16px 10px 40px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; background: #f8fafc; transition: all 0.2s; }
    .search-input:focus { outline: none; border-color: #3b82f6; background: white; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
    
    .search-results { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 4px; max-height: 400px; overflow-y: auto; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    .search-results.show { display: block; }
    .search-result-group { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; }
    .search-result-group:last-child { border-bottom: none; }
    .search-result-group-title { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .search-result-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .search-result-item:hover { background: #f1f5f9; }
    .search-result-type { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-right: 8px; font-weight: 500; }
    .type-plan { background: #dbeafe; color: #1d4ed8; }
    .type-story { background: #dcfce7; color: #15803d; }
    .type-task { background: #fef3c7; color: #b45309; }
    
    .main { max-width: 1400px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
    
    .sidebar { position: sticky; top: 80px; height: fit-content; }
    .plans-list { background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
    .plans-list-header { padding: 16px; border-bottom: 1px solid #e2e8f0; font-weight: 600; color: #0f172a; display: flex; justify-content: space-between; align-items: center; }
    .plans-count { font-size: 12px; color: #64748b; font-weight: normal; }
    
    .plan-item { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: all 0.15s; }
    .plan-item:hover { background: #f8fafc; }
    .plan-item.active { background: #eff6ff; border-left: 3px solid #3b82f6; }
    .plan-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .plan-item-id { font-weight: 600; font-size: 14px; color: #3b82f6; }
    .plan-item-status { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
    .status-in_progress { background: #dcfce7; color: #15803d; }
    .status-completed { background: #dbeafe; color: #1d4ed8; }
    .status-pending { background: #f1f5f9; color: #64748b; }
    .plan-item-title { font-size: 13px; color: #475569; line-height: 1.4; }
    .plan-item-meta { margin-top: 8px; display: flex; gap: 12px; font-size: 11px; color: #94a3b8; }
    
    .content { min-height: 500px; }
    .detail-view { background: white; border-radius: 12px; border: 1px solid #e2e8f0; display: none; }
    .detail-view.show { display: block; }
    
    .detail-header { padding: 24px; border-bottom: 1px solid #e2e8f0; }
    .detail-title-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .detail-id { font-size: 12px; font-weight: 600; color: #3b82f6; text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-title { font-size: 24px; font-weight: 700; color: #0f172a; margin-top: 4px; }
    .detail-meta { display: flex; gap: 24px; margin-top: 16px; flex-wrap: wrap; }
    .detail-meta-item { font-size: 13px; }
    .detail-meta-label { color: #64748b; }
    .detail-meta-value { color: #0f172a; font-weight: 500; }
    
    .tabs { display: flex; border-bottom: 1px solid #e2e8f0; padding: 0 24px; background: #f8fafc; }
    .tab { padding: 14px 20px; font-size: 14px; font-weight: 500; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
    .tab:hover { color: #3b82f6; }
    .tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }
    .tab-count { display: inline-block; background: #e2e8f0; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-left: 6px; }
    
    .tab-content { padding: 24px; display: none; }
    .tab-content.show { display: block; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #f8fafc; padding: 16px; border-radius: 8px; text-align: center; }
    .stat-value { font-size: 28px; font-weight: 700; color: #0f172a; }
    .stat-label { font-size: 12px; color: #64748b; margin-top: 4px; }
    
    .decisions-table { width: 100%; border-collapse: collapse; }
    .decisions-table th { text-align: left; padding: 12px; background: #f8fafc; font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    .decisions-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
    .decisions-table tr:hover { background: #f8fafc; }

    .overview-sections { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .section-card { border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px 16px; background: #fff; }
    .section-title { font-size: 12px; font-weight: 700; color: #0f172a; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .section-body { font-size: 13px; color: #334155; line-height: 1.6; white-space: pre-wrap; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { font-size: 12px; padding: 6px 10px; border-radius: 999px; background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    details.summary-block > summary { cursor: pointer; font-size: 12px; color: #3b82f6; font-weight: 600; }
    details.summary-block { margin-top: 10px; }
    
    .stories-list { display: flex; flex-direction: column; gap: 8px; }
    .story-item { padding: 14px 16px; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
    .story-item:hover { border-color: #3b82f6; box-shadow: 0 2px 8px rgba(59, 130, 246, 0.1); }
    .story-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .story-id { font-weight: 600; font-size: 14px; color: #3b82f6; }
    .story-status { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
    .story-description { font-size: 14px; color: #475569; }
    .story-tasks { margin-top: 8px; font-size: 12px; color: #94a3b8; }
    
    .tasks-list { display: flex; flex-direction: column; gap: 12px; }
    .task-item { padding: 16px; border: 1px solid #e2e8f0; border-radius: 8px; }
    .task-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .task-id { font-weight: 600; font-size: 14px; color: #8b5cf6; }
    .task-meta { display: flex; gap: 8px; align-items: center; }
    .task-size { font-size: 11px; padding: 2px 8px; background: #f1f5f9; border-radius: 4px; color: #64748b; }
    .task-status-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
    .task-what { font-size: 14px; color: #334155; line-height: 1.6; margin-bottom: 12px; }
    .task-dependencies { font-size: 12px; color: #64748b; margin-bottom: 8px; }
    .task-depends-on { color: #8b5cf6; }
    .task-dod { font-size: 12px; background: #f8fafc; padding: 10px; border-radius: 6px; margin-top: 10px; }
    .task-dod-title { font-weight: 600; color: #64748b; margin-bottom: 4px; }
    .task-notes { font-size: 12px; color: #64748b; margin-top: 8px; font-style: italic; }
    
    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; min-height: 400px; text-align: center; padding: 40px; }
    .welcome-icon { width: 64px; height: 64px; background: linear-gradient(135deg, #dbeafe, #ede9fe); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 28px; }
    .welcome-title { font-size: 20px; font-weight: 600; color: #0f172a; margin-bottom: 8px; }
    .welcome-text { color: #64748b; max-width: 300px; }
    
    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon">P</div>
        Plans Explorer
      </div>
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="search-input" id="searchInput" placeholder="Search plans, stories, tasks...">
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
  </header>
  
  <main class="main">
    <aside class="sidebar">
      <div class="plans-list">
        <div class="plans-list-header">
          Plans <span class="plans-count" id="plansCount"></span>
        </div>
        <div id="plansList"></div>
      </div>
    </aside>
    
    <div class="content">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">📋</div>
        <div class="welcome-title">Select a plan</div>
        <div class="welcome-text">Choose a plan from the sidebar to view its details, stories, and tasks.</div>
      </div>
      
      <div class="detail-view" id="detailView">
        <div class="detail-header">
          <div class="detail-title-row">
            <div>
              <div class="detail-id" id="detailId"></div>
              <div class="detail-title" id="detailTitle"></div>
            </div>
            <span class="plan-item-status" id="detailStatus"></span>
          </div>
          <div class="detail-meta">
            <div class="detail-meta-item">
              <span class="detail-meta-label">Created: </span>
              <span class="detail-meta-value" id="detailCreated"></span>
            </div>
            <div class="detail-meta-item">
              <span class="detail-meta-label">Last Updated: </span>
              <span class="detail-meta-value" id="detailLastUpdated"></span>
            </div>
            <div class="detail-meta-item">
              <span class="detail-meta-label">Requirements: </span>
              <span class="detail-meta-value" id="detailRequirements"></span>
            </div>
          </div>
        </div>
        
        <div class="tabs">
          <div class="tab active" data-tab="overview">Overview <span class="tab-count" id="overviewCount">0</span></div>
          <div class="tab" data-tab="stories">Stories <span class="tab-count" id="storiesCount">0</span></div>
          <div class="tab" data-tab="tasks">Tasks <span class="tab-count" id="tasksCount">0</span></div>
          <div class="tab" data-tab="decisions">Decisions <span class="tab-count" id="decisionsCount">0</span></div>
        </div>
        
        <div class="tab-content show" id="tab-overview">
          <div class="stats-grid" id="statsGrid"></div>
          
          <div id="overviewContent"></div>
        </div>
        
        <div class="tab-content" id="tab-stories">
          <div class="stories-list" id="storiesList"></div>
        </div>
        
        <div class="tab-content" id="tab-tasks">
          <div class="tasks-list" id="tasksList"></div>
        </div>
        
        <div class="tab-content" id="tab-decisions">
          <table class="decisions-table">
            <thead>
              <tr>
                <th>ID / Title</th>
                <th>Description / Choice</th>
                <th>Rationale</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="decisionsList"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
  
  <script>
    let plans = [];
    let currentPlan = null;
    
    async function loadPlans() {
      const res = await fetch('/api/plans');
      plans = await res.json();
      
      document.getElementById('plansCount').textContent = `(${plans.length})`;
      renderPlansList();
    }
    
    function renderPlansList() {
      const container = document.getElementById('plansList');
      container.innerHTML = plans.map(plan => `
        <div class="plan-item" data-id="${plan.id}" onclick="selectPlan('${plan.id}')">
          <div class="plan-item-header">
            <span class="plan-item-id">${plan.id}</span>
            <span class="plan-item-status status-${plan.status}">${formatStatus(plan.status)}</span>
          </div>
          <div class="plan-item-title">${plan.title}</div>
          <div class="plan-item-meta">
            <span>${plan.storiesCount} stories</span>
            <span>${plan.tasksCount} tasks</span>
          </div>
        </div>
      `).join('');
    }
    
    async function selectPlan(id) {
      document.querySelectorAll('.plan-item').forEach(el => el.classList.remove('active'));
      document.querySelector(`.plan-item[data-id="${id}"]`)?.classList.add('active');
      
      const res = await fetch(`/api/plans/${id}`);
      currentPlan = await res.json();
      renderDetail();
    }
    
    function renderDetail() {
      const p = currentPlan;
      
      document.getElementById('welcome').style.display = 'none';
      document.getElementById('detailView').classList.add('show');
      
      document.getElementById('detailId').textContent = p.id;
      document.getElementById('detailTitle').textContent = p.title;
      document.getElementById('detailStatus').textContent = formatStatus(p.status);
      document.getElementById('detailStatus').className = `plan-item-status status-${p.status}`;
      document.getElementById('detailCreated').textContent = p.created || 'N/A';
      document.getElementById('detailLastUpdated').textContent = p.lastUpdated || 'N/A';
      document.getElementById('detailRequirements').textContent = p.requirements || 'None';
      
      const storiesDone = p.stories?.filter(s => s.status?.toLowerCase().includes('done')).length || 0;
      const tasksDone = p.tasks?.filter(t => t.status === 'completed').length || 0;
      const tasksTotal = p.tasks?.length || 0;
      
      document.getElementById('overviewCount').textContent = storiesDone + '/' + (p.stories?.length || 0);
      document.getElementById('storiesCount').textContent = p.stories?.length || 0;
      document.getElementById('tasksCount').textContent = `${tasksDone}/${tasksTotal}`;
      document.getElementById('decisionsCount').textContent = p.decisions?.length || 0;
      
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-value">${p.stories?.length || 0}</div><div class="stat-label">Stories</div></div>
        <div class="stat-card"><div class="stat-value">${storiesDone}</div><div class="stat-label">Stories Done</div></div>
        <div class="stat-card"><div class="stat-value">${tasksTotal}</div><div class="stat-label">Tasks</div></div>
        <div class="stat-card"><div class="stat-value">${tasksDone}</div><div class="stat-label">Tasks Done</div></div>
      `;

      const phases = Array.isArray(p.phases) ? p.phases : [];
      const phasesChips = phases.length
        ? `<div class="chips">${phases.map(ph => {
            const title = (ph?.title || '').trim();
            const ids = Array.isArray(ph?.tasks) ? ph.tasks : [];
            const done = ids.length ? (p.tasks || []).filter(t => ids.includes(t.id) && t.status === 'completed').length : 0;
            return `<span class="chip">${escapeHtml(title)}${ids.length ? ` (${done}/${ids.length})` : ''}</span>`;
          }).join('')}</div>`
        : '';

      document.getElementById('overviewContent').innerHTML = `
        <div class="overview-sections">
          ${p.objective ? `
            <div class="section-card">
              <div class="section-title">Objective</div>
              <div class="section-body">${escapeHtml(p.objective)}</div>
            </div>
          ` : ''}
          ${p.targetArchitecture ? `
            <div class="section-card">
              <div class="section-title">Target Architecture</div>
              <div class="section-body">${escapeHtml(p.targetArchitecture)}</div>
            </div>
          ` : ''}
          ${phasesChips ? `
            <div class="section-card">
              <div class="section-title">Phases</div>
              ${phasesChips}
            </div>
          ` : ''}
          ${p.notes ? `
            <div class="section-card">
              <div class="section-title">Notes</div>
              <div class="section-body">${escapeHtml(p.notes)}</div>
            </div>
          ` : ''}
        </div>
      `;
      
      document.getElementById('storiesList').innerHTML = p.stories?.map(s => `
        <div class="story-item">
          <div class="story-header">
            <span class="story-id">${s.id}</span>
            <span class="story-status status-${s.status?.toLowerCase().includes('done') ? 'completed' : 'pending'}">${s.status}</span>
          </div>
          <div class="story-description">${s.description}</div>
          <div class="story-tasks">Tasks: ${s.tasks}</div>
        </div>
      `).join('') || '<p style="color:#94a3b8">No stories defined</p>';
      
      document.getElementById('tasksList').innerHTML = p.tasks?.map(t => `
        <div class="task-item">
          <div class="task-header">
            <span class="task-id">${t.id}</span>
            <div class="task-meta">
              <span class="task-size">${t.size || '-'}</span>
              <span class="task-status-badge status-${t.status === 'completed' ? 'completed' : 'pending'}">${t.status}</span>
            </div>
          </div>
          ${t.title ? `<div class="task-what"><strong>${escapeHtml(t.title)}</strong></div>` : ''}
          ${t.phase ? `<div class="task-notes">Phase: ${escapeHtml(t.phase)}</div>` : ''}
          ${t.files?.length ? `<div class="task-notes">Files: ${t.files.map(f => `<code>${escapeHtml(f)}</code>`).join(', ')}</div>` : ''}
          ${t.endpoints?.length ? `<div class="task-notes">Endpoints: ${t.endpoints.map(e => `<code>${escapeHtml(e)}</code>`).join(', ')}</div>` : ''}
          ${t.whatToDo ? `<div class="task-what">${escapeHtml(t.whatToDo)}</div>` : ''}
          ${t.dependsOn?.length ? `<div class="task-depends-on">Depends on: ${t.dependsOn.join(', ')}</div>` : ''}
          ${t.definitionOfDone?.length ? `
            <div class="task-dod">
              <div class="task-dod-title">Definition of Done:</div>
              ${t.definitionOfDone.map(d => `<div>• ${escapeHtml(d.description)} ${d.completed ? '✓' : '○'}</div>`).join('')}
            </div>
          ` : ''}
          ${(t.implementationNotes || t.notes) ? `
            <details class="summary-block">
              <summary>Notes</summary>
              ${t.implementationNotes ? `<div class="task-notes"><strong>Implementation Notes:</strong><br>${escapeHtml(t.implementationNotes)}</div>` : ''}
              ${t.notes ? `<div class="task-notes"><strong>Notes:</strong><br>${escapeHtml(t.notes)}</div>` : ''}
            </details>
          ` : ''}
        </div>
      `).join('') || '<p style="color:#94a3b8">No tasks defined</p>';
      
      document.getElementById('decisionsList').innerHTML = p.decisions?.map(d => `
        <tr>
          <td>${escapeHtml(d.id || d.decision || '')}</td>
          <td>${escapeHtml(d.description || d.choice || '')}</td>
          <td>${escapeHtml(d.rationale || d.motivation || '')}</td>
          <td>${escapeHtml(d.date || '')}</td>
        </tr>
      `).join('') || '<tr><td colspan="4" style="color:#94a3b8;text-align:center">No decisions recorded</td></tr>';
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
    
    function formatStatus(status) {
      const map = { 'in_progress': 'In Progress', 'completed': 'Completed', 'pending': 'Pending' };
      return map[status] || status;
    }
    
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('show'));
        tab.classList.add('active');
        document.getElementById(`tab-${tab.dataset.tab}`).classList.add('show');
      });
    });
    
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    
    searchInput.addEventListener('input', async (e) => {
      const query = e.target.value;
      if (query.length < 2) {
        searchResults.classList.remove('show');
        return;
      }
      
      const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
      const results = await res.json();
      
      if (results.length === 0) {
        searchResults.innerHTML = '<div style="padding:16px;color:#94a3b8">No results found</div>';
        searchResults.classList.add('show');
        return;
      }
      
      searchResults.innerHTML = results.map(r => `
        <div class="search-result-group">
          <div class="search-result-group-title">${r.plan}</div>
          ${r.matches.map(m => `
            <div class="search-result-item" onclick="selectPlan('${r.plan}')">
              <span class="search-result-type type-${m.type}">${m.type}</span>
              ${m.text}
            </div>
          `).join('')}
        </div>
      `).join('');
      searchResults.classList.add('show');
    });
    
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-box')) {
        searchResults.classList.remove('show');
      }
    });
    
    loadPlans();
  </script>
</body>
</html>
